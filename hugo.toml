baseURL = "https://linyao33.github.io/"
title = "Runyi Yao (姚润易)"
theme = "LoveIt"

defaultContentLanguage = "en"
languageCode = "en"
languageName = "English"
hasCJKLanguage = false

enableRobotsTXT = true
enableGitInfo = false
enableEmoji = true

ignoreErrors = ["error-remote-getjson", "error-missing-instagram-accesstoken"]

[pagination]
  pagerSize = 10

# Menu
[menu]
  [[menu.main]]
    weight = 1
    identifier = "learning"
    pre = ""
    post = ""
    name = "Learning"
    url = "/learning/"
    title = ""
  [[menu.main]]
    weight = 2
    identifier = "life"
    pre = ""
    post = ""
    name = "Life"
    url = "/life/"
    title = ""
  [[menu.main]]
    weight = 3
    identifier = "projects"
    pre = ""
    post = ""
    name = "Projects"
    url = "/projects/"
    title = ""

[params]
  defaultTheme = "auto"
  dateFormat = "2006-01-02"
  title = "Runyi Yao (姚润易)"
  description = "My personal website and blog"
  images = []

  [params.author]
    name = "Runyi Yao"
    email = ""
    link = ""

  [params.header]
    desktopMode = "fixed"
    mobileMode = "auto"
    [params.header.title]
      logo = ""
      name = "Runyi Yao (姚润易)"
      pre = ""
      post = ""
      typeit = false

  [params.footer]
    enable = true
    custom = ""
    hugo = true
    copyright = true
    author = true
    since = 2026
    icp = ""
    license = ""

  [params.section]
    paginate = 20
    dateFormat = "01-02"
    rss = 10

  [params.list]
    paginate = 20
    dateFormat = "01-02"
    rss = 10

  [params.search]
    enable = true
    type = "lunr"
    contentLength = 4000
    placeholder = ""
    maxResultLength = 10
    snippetLength = 30
    highlightTag = "em"
    absoluteURL = false

  [params.home]
    rss = 10
    [params.home.profile]
      enable = true
      gravatarEmail = ""
      avatarURL = ""
      title = ""
      subtitle = "Welcome to my website"
      typeit = true
      social = false
      disclaimer = ""
    [params.home.posts]
      enable = false

  [params.social]
    GitHub = ""
    Linkedin = ""
    X = ""
    Email = ""
    RSS = true

  [params.page]
    hiddenFromHomePage = false
    hiddenFromSearch = false
    twemoji = false
    lightgallery = false
    ruby = true
    fraction = true
    fontawesome = true
    linkToMarkdown = true
    rssFullText = false
    [params.page.toc]
      enable = true
      keepStatic = false
      auto = true
    [params.page.code]
      copy = true
      maxShownLines = 50
    [params.page.math]
      enable = false
    [params.page.share]
      enable = true
      X = true
      Facebook = true
      Linkedin = true
      HackerNews = true
      Reddit = true
    [params.page.comment]
      enable = false

  [params.typeit]
    speed = 100
    cursorSpeed = 1000
    cursorChar = "|"
    duration = -1

  [params.cdn]
    data = ""

[markup]
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = true
    lineNumbersInTable = true
    noClasses = false
  [markup.goldmark]
    [markup.goldmark.extensions]
      definitionList = true
      footnote = true
      linkify = true
      strikethrough = true
      table = true
      taskList = true
      typographer = true
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 6

[taxonomies]
  tag = "tags"
  project = "projects"

[sitemap]
  changefreq = "weekly"
  filename = "sitemap.xml"
  priority = 0.5

[permalinks]
  learning = ":contentbasename"

[outputs]
  home = ["HTML", "RSS", "JSON"]
  page = ["HTML", "MarkDown"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML", "RSS"]

[mediaTypes]
  [mediaTypes."text/plain"]
    suffixes = ["md"]

[outputFormats.MarkDown]
  mediaType = "text/plain"
  isPlainText = true
  isHTML = false
